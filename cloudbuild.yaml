steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--build-arg"
      - "NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL}"
      - "-t"
      - "${_IMAGE}:latest"
      - "-t"
      - "${_IMAGE}:$BUILD_ID"
      - "."
    dir: "frontend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_IMAGE}"]

images:
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
